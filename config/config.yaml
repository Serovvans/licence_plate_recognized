# сиды, девайс, пути
seed: 42
device: cuda

data:
  images_path: data/raw/data_jpg/images
  annotations_path: data/raw/data_jpg/annotation/train_final_annot.txt
  img_size: 640

  yolo_dataset_path: data/processed/detector
  yolo_dataset_config: config/training/yolo_dataset.yaml

  gdrive_url: "https://drive.google.com/file/d/1Rd1yCiRSL2Xpbv2axhs0QzZxhBZFhFIL/view?usp=drive_link"
  raw_path: data/raw

training:
  epochs: 150
  batch_size: 16
  model: "yolo26n.pt"
  workers: 4
  cache: false

inference:
  weights: runs/detect/runs/detect/hk_plates_v13/weights/best.pt
  images_path: data/raw/data_jpg/images/test
  output_path: data/predictions.txt